name: TimeBar
version: ${version}
main: lol.hyper.timebar.TimeBar
api-version: '26.1.1'
author: hyperdefined
website: https://github.com/hyperdefined/TimeBar
description: See the world's time as a bossbar.
softdepend: [Multiverse-Core, RealisticSeasons, AdvancedSeasons, PlaceholderAPI]
load: POSTWORLD

loader: lol.hyper.timebar.TimeBarLoader

permissions:
  timebar.command:
    default: true
    description: Allows the usage of /timebar.
  timebar.reload:
    default: op
    description: Allows the usage of /timebar reload.
  timebar.enable:
    default: true
    description: Allows the usage of /timebar on.
  timebar.disable:
    default: true
    description: Allows the usage of /timebar off.

dependencies:
  server:
    Multiverse-Core:
      load: AFTER
      required: false
    RealisticSeasons:
      load: AFTER
      required: false
    AdvancedSeasons:
      load: AFTER
      required: false
    PlaceholderAPI:
      load: AFTER
      required: false